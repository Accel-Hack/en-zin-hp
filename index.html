<!DOCTYPE html>
<html lang="ja">
<head>

</head>
<body>
<div class="wrapper">
    <header class="header">
        <div class="header__wrapper">
            <div class="header__inner">
                <div class="header__logo">
                    <h1 class="header__logo-item">
                        <a class="header__logo-link" href="#top">
                            <img class="header__logo-img" src="./img/logo-w.png" alt="ヘッダーロゴ">

                    </h1>
                </div>
                <nav class="header__nav">

                        <li class="header__nav-item">
                            <a class="header__nav-link" href="#top">top</a>
                        </li>
                        <li class="header__nav-item">
                            <a class="header__nav-link" href="#about">about</a>
                        </li>
                        <li class="header__nav-item">
                            <a class="header__nav-link" href="#work">work</a>
                        </li>
                        <li class="header__nav-item">
                            <a class="header__nav-link" href="#access">access</a>
                        </li>
                        <li class="header__nav-item">
                            <a class="header__nav-link" href="#contact">contact</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

    <main class="main">
        <div class="main__inner">
            <div class="main__wrapper">
                <section class="index-kv__container parallax" id="top">
                    <div class="index-kv">
                        <div class="index-kv__inner">
                            <img class="index-kv__img1" src="./img/en_3D.png" alt="ロゴ 3D">
                            <img class="index-kv__img2" src="./img/logo_text.svg" alt="ロゴ テキスト">
                            <div class="index-kv__txtArea">
                                <div class="index-kv__txtArea-sbttl-area">
                                    <h4 class="index-kv__txtArea-sbttl">
                                        自分の「好き」を、誰かの「悦び」に。
                                    </h4>
                                </div>
                                <div class="index-kv__txtArea-txt-area">
                                    <h5 class="index-kv__txtArea-txt">
                                        Connect what you
                                        <br>
                                        like to someone else's joy.
                                    </h5>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="index-about__container parallax" id="about">
                    <div class="index-about">
                        <div class="index-about__inner">
                            <h2 class="index-about__txt">
                                join
                            </h2>
                            <div class="index-about__box">
                            </div>
                            <div class="index-about__txtArea">
                                <div class="index-about__txtArea-ttl-area">
                                    <h3 class="index-about__txtArea-ttl">
                                        about
                                    </h3>
                                </div>
                                <div class="index-about__txtArea-sbttl-area">
                                    <h4 class="index-about__txtArea-sbttl">
                                        誰かの「人生の1ページ」の悦びに繋げる。
                                    </h4>
                                </div>
                                <div class="index-about__txtArea-txt-area">
                                    <h5 class="index-about__txtArea-txt">
                                        テキストテキストテキストテキストテキストテキス
                                        <br>
                                        テキストテキストテキストテキストテキストテキス
                                    </h5>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="index-work__container parallax" id="work"></section>
                <section class="index-access__container parallax" id="access"></section>
                <section class="index-contact__container parallax" id="contact"></section>
            </div>
        </div>
